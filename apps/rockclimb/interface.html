<html>
<head>
    <link rel="stylesheet" href="../../css/spectre.min.css">
</head>
<body>
<div id="data">

</div>

<script src="../../core/lib/interface.js"></script>
<script>

    async function onInit(){

        Util.showModal("Loading...");

        const dataEl = document.getElementById('data');

        const filelist = await new Promise(resolve => {
            Puck.eval(`require("Storage").list(/^rockclimb.*\\.json$/)`, resolve);
        });

        if(filelist.length === 0){
            dataEl.innerHTML = `<p>No recordings found.</p>`;
            Util.hideModal();
            return;
        }

        let files = {};

        let html = `<a id="downloadAll" href="#">Download All</a>&nbsp;|&nbsp;<a id="deleteAll" href="#">Delete All</a>`;

        for(let file of filelist){
            const json = await new Promise(resolve => Util.readStorageJSON(file, resolve));
            files[file] = json;
            const date = new Date(parseInt(json.start));
            html += `<details>
  <summary>${date.toDateString()} - ${date.toLocaleTimeString()} - Grade ${json.grade}</summary>
  <p>
    <dl>
        <dt>Grade</dt>
        <dd>${json.grade}</dd>
        <dt>Incline</dt>
        <dd>${json.incline}</dd>
        <dt>Type</dt>
        <dd>${json.type}</dd>
    </dl>
    <a href="#" action="download" filename="${file}">Download</a>&nbsp;|&nbsp;<a href="#" action="delete" filename="${file}">Delete</a>
  </p>
</details>`;
        }

        dataEl.innerHTML = html;

        document.getElementById('downloadAll').addEventListener('click', async () => {
            Util.showModal("Downloading...");
            for(let filename in files){
                await downloadData(filename);
            }
            Util.hideModal();
            await onInit();
        });

        document.getElementById('deleteAll').addEventListener('click', async () => {
            if(!confirm(`Delete all?`)){
                return;
            }
            Util.showModal("Deleting...");
            for(let filename in files){
                await deleteData(filename);
            }
            Util.hideModal();
            await onInit();
        });

        document.querySelectorAll(`a[action="download"][filename]`).forEach(button => {
            button.addEventListener("click", async e => {
                Util.showModal("Downloading...");
                const filename = e.currentTarget.getAttribute("filename");
                await downloadData(filename);
                Util.hideModal();
                await onInit();
            });
        });

        document.querySelectorAll(`a[action="delete"][filename]`).forEach(button => {
            button.addEventListener("click", async e => {
                if(!confirm("Delete?")){
                    return;
                }
                Util.showModal("Deleting...");
                const filename = e.currentTarget.getAttribute("filename");
                await deleteData(filename);
                Util.hideModal();
                await onInit();
            });
        });

        Util.hideModal();

        //Adapted from recorder/interface.html
        async function downloadData(filename) {

            const metadata = files[filename];

            const datafile = await new Promise(resolve => Util.readStorageFile(filename.replace('.json', '.csv'), resolve));

            console.log(datafile);

            const datapoints = datafile.split('\n');

            //remove header and footer
            datapoints.shift();
            datapoints.pop();

            const trkpts = datapoints.map(dp => {
                console.log(dp);
                const [offset, hr, alt] = dp.split(',').map(parseFloat);
                const time = new Date(parseInt(metadata.start) + offset);
                return `
        <trkpt lat="0" lon="0">
          <ele>${alt}</ele>
          <time>${time.toISOString()}</time>
          ${hr > 0 ? `<extensions><gpxtpx:TrackPointExtension><gpxtpx:hr>${hr}</gpxtpx:hr></gpxtpx:TrackPointExtension></extensions>` : ``}
        </trkpt>`;
                });

            const gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx creator="Bangle.js" version="1.1" xmlns="http://www.topografix.com/GPX/1/1/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://www.topografix.com/GPX/1/1 http://www.topografix.com/GPX/1/1/gpx.xsd http://www.garmin.com/xmlschemas/GpxExtensions/v3 http://www.garmin.com/xmlschemas/GpxExtensionsv3.xsd http://www.garmin.com/xmlschemas/TrackPointExtension/v1 http://www.garmin.com/xmlschemas/TrackPointExtensionv1.xsd" xmlns:gpxtpx="http://www.garmin.com/xmlschemas/TrackPointExtension/v1" xmlns:gpxx="http://www.garmin.com/xmlschemas/GpxExtensions/v3">
  <metadata><time>${new Date(parseInt(metadata.start)).toISOString()}</time></metadata>
  <metadata>
    <author>
      <name>Bangle.js</name>
      <link href="https://banglejs.com/apps/?id=rockclimb" />
    </author>
    <extensions>
      <climb:route>
        <climb:incline>${metadata.incline}</climb:incline>
        <climb:grade>${metadata.grade}</climb:grade>
        <climb:type>${metadata.type}</climb:type>
      </climb:route>
    </extensions>
  </metadata>
  <trk>
    <name>${filename.replace('.json', '')}</name>
    <trkseg>${trkpts.join('')}
    </trkseg>
  </trk>
</gpx>`;

            Util.saveFile(filename.replace('.json', '.gpx'), "gpx+xml", gpx);

        }

        async function deleteData(filename){
            await new Promise(resolve => Util.eraseStorage(filename, resolve));
            await new Promise(resolve => Util.readStorageFile(filename.replace('.json', '.csv'), resolve));
        }

    }

</script>
</body>
</html>
